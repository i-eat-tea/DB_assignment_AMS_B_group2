<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Room Detail - PHROVILLA</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container-xxl bg-white p-0">

    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <div class="container-fluid bg-dark px-0">
        <div class="row gx-0">
            <div class="col-lg-3 bg-dark d-none d-lg-block">
                <a href="index.html" class="navbar-brand w-100 h-100 m-0 p-0 d-flex align-items-center justify-content-center">
                    <h1 class="m-0 text-primary text-uppercase">PHROVILLA</h1>
                </a>
            </div>
            <div class="col-lg-9">
                <nav class="navbar navbar-expand-lg bg-dark navbar-dark p-3 p-lg-0">
                    <a href="index.html" class="navbar-brand d-block d-lg-none">
                        <h1 class="m-0 text-primary text-uppercase">PHROVILLA</h1>
                    </a>
                    <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                        <div class="navbar-nav mr-auto py-0">
                            <a href="index.html" class="nav-item nav-link">Home</a>
                            <a href="room.html" class="nav-item nav-link active">Rooms</a>
                            <a href="booking.html" class="nav-item nav-link">Booking</a>
                            <a href="team.html" class="nav-item nav-link">Our Team</a>
                        </div>
                        <div class="navbar-nav ms-auto py-0 pe-4" id="auth-nav"></div>
                    </div>
                </nav>
            </div>
        </div>
    </div>

    <div class="container-fluid page-header mb-5 p-0" style="background-image: url(img/carousel-1.jpg);">
        <div class="container-fluid page-header-inner py-5">
            <div class="container text-center pb-5">
                <h1 class="display-3 text-white mb-3 animated slideInDown">Room Detail</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center text-uppercase">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item"><a href="room.html">Rooms</a></li>
                        <li class="breadcrumb-item text-white active">Detail</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>

    <div class="container-xxl py-5 pb-5 mb-5">
        <div class="container" id="room-detail-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <div class="container-xxl py-5 bg-light rounded" id="room-reviews-section" style="display: none;">
        <div class="container">
            <div class="text-center">
                <h6 class="section-title text-center text-primary text-uppercase">Reviews</h6>
                <h1 class="mb-5">What Guests Say About This Room</h1>
            </div>
            
            <div class="row g-4" id="room-reviews-grid">
                </div>

            <div id="reviews-pagination-controls" class="d-flex justify-content-center align-items-center mt-5 gap-3">
                </div>
        </div>
    </div>

    <div class="container-fluid bg-dark text-light footer wow fadeIn mt-5" data-wow-delay="0.1s">
        <div class="container pb-5">
            <div class="row g-5">
                <div class="col-md-6 col-lg-4">
                    <div class="bg-primary rounded p-4">
                        <a href="index.html"><h1 class="text-white text-uppercase mb-3">PHROVILLA</h1></a>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <h6 class="section-title text-start text-primary text-uppercase mb-4">Contact</h6>
                    <p class="mb-2"><i class="fa fa-map-marker-alt me-3"></i>42p Street, Phnom Penh, Cambodia</p>
                    <p class="mb-2"><i class="fa fa-phone-alt me-3"></i>+855 885 130 520</p>
                    <p class="mb-2"><i class="fa fa-envelope me-3"></i>PHROVILLA@gmail.com</p>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="lib/wow/wow.min.js"></script>
<script src="lib/easing/easing.min.js"></script>
<script src="js/main.js"></script>

<script>
let roomReviews = [];
let currentPage = 0;
const reviewsPerPage = 6;

async function fetchRoomPageData() {
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('id');

    if (!roomId) {
        document.getElementById('room-detail-container').innerHTML =
            '<p class="text-danger text-center">No room ID provided.</p>';
        return;
    }

    try {
        // 1. Fetch Room Specs
        const roomRes = await fetch(`https://db-assignment-ams-b-group2.onrender.com/api/customer/rooms/${roomId}`);
        const r = await roomRes.json();

        // 2. Fetch All Reviews to Client-Side Filter by Room
        const reviewRes = await fetch('https://db-assignment-ams-b-group2.onrender.com/api/customer/reviews');
        const allReviews = await reviewRes.json();
        
        // Filter reviews matching your specific room context item
        roomReviews = allReviews.filter(review => String(review.room_number) === String(r.number));

        // Calculate Average Stars Rating
        let avgStarsHtml = '<span class="text-muted fs-6 font-normal ms-2">No reviews yet</span>';
        if (roomReviews.length > 0) {
            const sum = roomReviews.reduce((total, rev) => total + rev.stars, 0);
            const average = (sum / roomReviews.length).toFixed(1);
            avgStarsHtml = `
                <span class="ms-3 badge bg-warning text-dark align-middle fs-6">
                    <i class="fa fa-star me-1"></i>${average} / 5.0 (${roomReviews.length} Reviews)
                </span>
            `;
        }

        // Render Room Layout View
        const images = r.images?.length ? r.images : ['img/room-1.jpg'];
        const carouselId = 'room-carousel';

        const slides = images.map((src, j) => `
            <div class="carousel-item ${j === 0 ? 'active' : ''}">
                <img src="${src}" class="d-block w-100" style="height:480px; object-fit:cover;" onerror="this.src='img/room-1.jpg'" alt="${r.type}">
            </div>
        `).join('');

        const controls = images.length > 1 ? `
            <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
            <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
        ` : '';

        document.getElementById('room-detail-container').innerHTML = `
        <div class="row g-5">
            <div class="col-lg-7">
                <div id="${carouselId}" class="carousel slide rounded overflow-hidden shadow" data-bs-ride="carousel">
                    <div class="carousel-inner">${slides}</div>
                    ${controls}
                </div>
            </div>

            <div class="col-lg-5">
                <h6 class="section-title text-primary text-uppercase">Room Detail</h6>
                <h1 class="mb-4">${r.type}</h1>

                <div class="d-flex mb-3">
                    <span class="badge bg-primary me-2 py-2 px-3">Room No. ${r.number}</span>
                    <span class="badge bg-secondary py-2 px-3">Capacity: ${r.capacity}</span>
                </div>

                <h3 class="text-primary mb-4">$${r.price} <small class="fs-6 text-muted">/Night</small> ${avgStarsHtml}</h3>

                <div class="d-flex mb-4 gap-3">
                    <div class="border rounded text-center p-3 flex-fill">
                        <i class="fa fa-bed fa-2x text-primary mb-2"></i>
                        <p class="mb-0">${r.bedroom_amount ?? '-'} Bedroom</p>
                    </div>
                    <div class="border rounded text-center p-3 flex-fill">
                        <i class="fa fa-bath fa-2x text-primary mb-2"></i>
                        <p class="mb-0">${r.bathroom_amount ?? '-'} Bathroom</p>
                    </div>
                    <div class="border rounded text-center p-3 flex-fill">
                        <i class="fa fa-wifi fa-2x ${r.has_wifi ? 'text-primary' : 'text-muted'} mb-2"></i>
                        <p class="mb-0">${r.has_wifi ? 'WiFi' : 'No WiFi'}</p>
                    </div>
                </div>

                <div class="mb-4">
                    <span class="badge ${r.current_condition === 'free' ? 'bg-success' : (r.current_condition === 'occupied' ? 'bg-danger' : 'bg-warning')} py-2 px-3 text-uppercase">
                        ${r.current_condition ?? 'Unknown'}
                    </span>
                </div>

                <a href="https://db-assignment-ams-b-group2.onrender.com/customer/booking.html?room_id=${r.room_id}" class="btn btn-primary py-3 px-5 w-100">
                    <i class="fa fa-calendar-check me-2"></i>Book Now
                </a>
            </div>
        </div>
        `;

        // Render Room Reviews if any exist
        if (roomReviews.length > 0) {
            document.getElementById('room-reviews-section').style.display = 'block';
            renderReviewGrid();
        }

    } catch (err) {
        document.getElementById('room-detail-container').innerHTML =
            '<p class="text-danger text-center">Failed to load room details.</p>';
    }
}

function renderReviewGrid() {
    const grid = document.getElementById('room-reviews-grid');
    const controls = document.getElementById('reviews-pagination-controls');
    
    const start = currentPage * reviewsPerPage;
    const end = start + reviewsPerPage;
    const visible = roomReviews.slice(start, end);

    grid.innerHTML = visible.map(rev => `
        <div class="col-lg-4 col-md-6">
            <div class="testimonial-item position-relative bg-white border rounded p-4">
                <p class="mb-3">${rev.statement}</p>
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <h6 class="fw-bold mb-1">${rev.customer_name}</h6>
                        <small class="text-muted">${rev.review_date || 'Recent Stay'}</small>
                        <div class="text-primary mt-1">
                            ${'<small class="fa fa-star"></small>'.repeat(rev.stars)}
                        </div>
                    </div>
                    <div class="opacity-25 align-self-end">
                        <i class="fa fa-quote-right fa-2x text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
    `).join('');

    controls.innerHTML = `
        <button class="btn btn-outline-primary rounded-circle px-3 py-2" onclick="navigateReviews(-1)" ${currentPage === 0 ? 'disabled' : ''}>
            <i class="fa fa-arrow-left"></i>
        </button>
        <span class="text-muted fw-bold">Page ${currentPage + 1} of ${Math.ceil(roomReviews.length / reviewsPerPage)}</span>
        <button class="btn btn-outline-primary rounded-circle px-3 py-2" onclick="navigateReviews(1)" ${end >= roomReviews.length ? 'disabled' : ''}>
            <i class="fa fa-arrow-right"></i>
        </button>
    `;
}

function navigateReviews(direction) {
    currentPage += direction;
    renderReviewGrid();
    document.getElementById('room-reviews-section').scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', fetchRoomPageData);
</script>
</body>
</html>
