<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Form | Hotel AMS-B</title>
  <link href="img/favicon.ico" rel="icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1D9E75;
      --primary-dark: #0F6E56;
      --primary-light: #E1F5EE;
      --bg: #F7F8F6;
      --surface: #FFFFFF;
      --surface-2: #F1F3F0;
      --text: #1A1D1A;
      --text-muted: #6B7068;
      --border: #E2E6E0;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .back-btn:hover { background: var(--surface-2); color: var(--text); }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .divider-v { width: 1px; height: 18px; background: var(--border); }

    /* Content */
    .content { max-width: 680px; margin: 32px auto; padding: 0 20px 60px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title i { color: var(--primary); }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Field */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field select:focus { border-color: var(--primary); }
    .field input::placeholder { color: #B0B5AF; }

    /* Checkbox field */
    .field-check {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .field-check:hover { background: var(--surface-2); }
    .field-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .field-check label {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      margin: 0;
    }

    /* Image list */
    .image-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .image-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-muted);
    }
    .image-item .img-preview {
      width: 40px;
      height: 32px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border);
    }
    .image-item .img-link { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .image-item .remove-btn {
      background: none;
      border: none;
      color: #9B2335;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .image-item .remove-btn:hover { background: #FDE8E8; }

    .add-image-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-image-row input { flex: 1; }
    .btn-add-img {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn-add-img:hover { background: var(--surface-2); }

    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s;
      background: var(--surface);
      color: var(--text);
    }
    .btn:hover { background: var(--surface-2); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

    /* Toast */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      animation: slideUp 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .toast.success { background: #EDF7F0; color: #2B5E38; border: 1px solid #A3D9B1; }
    .toast.error { background: #FDE8E8; color: #9B2335; border: 1px solid #F5C2C7; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Mode badge */
    .mode-badge {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }
    .mode-add { background: var(--primary-light); color: var(--primary-dark); }
    .mode-edit { background: #FEF3CD; color: #7D5A00; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
      </a>
      <div class="divider-v"></div>
      <span class="topbar-title" id="pageTitle">Add Room</span>
      <span class="mode-badge mode-add" id="modeBadge">NEW</span>
    </div>
  </div>

  <div class="content">

    <!-- Basic Info -->
    <div class="card">
      <div class="card-title"><i class="fas fa-door-open"></i> Room Details</div>
      <div class="grid-2">
        <div class="field">
          <label>Room Number</label>
          <input type="text" id="number" placeholder="e.g. 101">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="type">
            <option value="">Select type</option>
            <option value="standard">Standard</option>
            <option value="deluxe">Deluxe</option>
            <option value="suite">Suite</option>
          </select>
        </div>
        <div class="field">
          <label>Price per Night ($)</label>
          <input type="number" id="price" placeholder="e.g. 80" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Capacity</label>
          <input type="number" id="capacity" placeholder="e.g. 2" min="1">
        </div>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Condition</label>
        <select id="conditions">
          <option value="free">Free</option>
          <option value="occupied">Occupied</option>
          <option value="repairing">Repairing</option>
        </select>
      </div>
    </div>

    <!-- Amenities -->
    <div class="card">
      <div class="card-title"><i class="fas fa-concierge-bell"></i> Amenities</div>
      <div class="grid-2">
        <div class="field">
          <label>Bedrooms</label>
          <input type="number" id="bedroom_amount" placeholder="e.g. 1" min="0">
        </div>
        <div class="field">
          <label>Bathrooms</label>
          <input type="number" id="bathroom_amount" placeholder="e.g. 1" min="0">
        </div>
      </div>
      <div class="field-check" style="margin-top:4px" onclick="document.getElementById('has_wifi').click()">
        <input type="checkbox" id="has_wifi">
        <label for="has_wifi"><i class="fas fa-wifi" style="color:var(--primary);margin-right:6px"></i> WiFi Available</label>
      </div>
    </div>

    <!-- Images -->
    <div class="card">
      <div class="card-title"><i class="fas fa-images"></i> Room Images</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">
        Paste image URLs or server paths (e.g. <span style="font-family:'IBM Plex Mono',monospace">http://localhost:3000/img/room.gif</span>)
      </p>

      <div class="image-list" id="imageList"></div>

      <div class="add-image-row">
        <input type="text" id="newImageUrl" class="field input" placeholder="http://localhost:3000/img/your-image.jpg" style="margin:0">
        <button class="btn-add-img" onclick="addImageUrl()">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <a href="dashboard.html" class="btn">Cancel</a>
      <button class="btn btn-primary" onclick="saveRoom()">
        <i class="fas fa-save"></i> <span id="saveBtnText">Save Room</span>
      </button>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    const API = '/api/staff';
    let token = localStorage.getItem('staff_token');
    let roomId = null;
    let pendingImages = []; // new image URLs to add
    let existingImages = []; // already saved images

    // ── Auth check ──
    const staff = JSON.parse(localStorage.getItem('staff') || '{}');
    if (!token || !staff.staff_id) window.location.href = 'staff-login.html';

    // ── Detect mode (add vs edit) ──
    const params = new URLSearchParams(window.location.search);
    roomId = params.get('room_id') ? parseInt(params.get('room_id')) : null;

    if (roomId) {
      document.getElementById('pageTitle').textContent = 'Edit Room';
      document.getElementById('modeBadge').textContent = 'EDIT';
      document.getElementById('modeBadge').className = 'mode-badge mode-edit';
      document.getElementById('saveBtnText').textContent = 'Save Changes';
      loadRoom(roomId);
    }

    // ── Load room for editing ──
    async function loadRoom(id) {
      try {
        const res = await fetch(`${API}/room/${id}`, {
          headers: { 'x-staff-token': token }
        });
        const r = await res.json();
        console.log(r);
        if (r.error) { showToast(r.error, 'error'); return; }

        document.getElementById('number').value = r.number || '';
        document.getElementById('type').value = r.type || '';
        document.getElementById('price').value = r.price || '';
        document.getElementById('capacity').value = r.capacity || '';
        document.getElementById('conditions').value = r.conditions || 'free';
        document.getElementById('bedroom_amount').value = r.bedroom_amount || '';
        document.getElementById('bathroom_amount').value = r.bathroom_amount || '';
        document.getElementById('has_wifi').checked = r.has_wifi == 1;

        existingImages = r.images || [];
        renderImages();
      } catch (e) {
        showToast('Failed to load room.', 'error');
      }
    }

    // ── Image management ──
    function addImageUrl() {
      const input = document.getElementById('newImageUrl');
      const url = input.value.trim();
      if (!url) return;
      pendingImages.push(url);
      input.value = '';
      renderImages();
    }

    document.getElementById('newImageUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') addImageUrl();
    });

    function removeImage(src, isPending) {
      if (isPending) {
        pendingImages = pendingImages.filter(u => u !== src);
      } else {
        existingImages = existingImages.filter(u => u !== src);
      }
      renderImages();
    }

    function renderImages() {
      const list = document.getElementById('imageList');
      const all = [
        ...existingImages.map(u => ({ url: u, pending: false })),
        ...pendingImages.map(u => ({ url: u, pending: true }))
      ];

      if (!all.length) {
        list.innerHTML = '<p style="font-size:12px;color:var(--text-muted)">No images yet.</p>';
        return;
      }

      list.innerHTML = all.map(({ url, pending }) => `
        <div class="image-item">
          <img class="img-preview" src="${url}" onerror="this.style.display='none'">
          <span class="img-link" title="${url}">${url}</span>
          ${pending ? '<span style="font-size:10px;color:var(--primary);font-family:IBM Plex Mono,monospace">NEW</span>' : ''}
          <button class="remove-btn" onclick="removeImage('${url}', ${pending})" title="Remove">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `).join('');
    }

    // ── Save ──
    async function saveRoom() {
      const number = document.getElementById('number').value.trim();
      const type = document.getElementById('type').value;
      const price = document.getElementById('price').value;
      const capacity = document.getElementById('capacity').value;
      const conditions = document.getElementById('conditions').value;
      const has_wifi = document.getElementById('has_wifi').checked;
      const bedroom_amount = document.getElementById('bedroom_amount').value || 0;
      const bathroom_amount = document.getElementById('bathroom_amount').value || 0;

      if (!number || !type || !price || !capacity) {
        showToast('Please fill in all required fields.', 'error');
        return;
      }

      const body = {
        number, type,
        price: parseFloat(price),
        capacity: parseInt(capacity),
        conditions, has_wifi,
        bedroom_amount: parseInt(bedroom_amount),
        bathroom_amount: parseInt(bathroom_amount),
        // send all pending image URLs
        image_urls: pendingImages
      };

      try {
        let res;
        if (roomId) {
          res = await fetch(`${API}/room/${roomId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'x-staff-token': token },
            body: JSON.stringify(body)
          });
        } else {
          res = await fetch(`${API}/room`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-staff-token': token },
            body: JSON.stringify(body)
          });
        }

        const data = await res.json();
        if (data.success) {
          showToast(roomId ? 'Room updated!' : 'Room added!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          showToast(data.error || 'Save failed.', 'error');
        }
      } catch (e) {
        showToast('Server error.', 'error');
      }
    }

    // ── Toast ──
    function showToast(msg, type = 'success') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // init render
    renderImages();
  </script>
</body>
</html>
