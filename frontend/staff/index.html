<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel AMS-B — Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F1117;
      --surface: #161B22;
      --surface-2: #1C2128;
      --border: rgba(255,255,255,0.08);
      --accent: #58A6FF;
      --accent-dim: rgba(88,166,255,0.1);
      --text: #E6EDF3;
      --muted: #6E7681;
      --danger: #F85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%; max-width: 400px; padding: 20px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .header {
      margin-bottom: 32px;
    }
    .header .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    input, select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface-2); }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #0D1117;
      border: none;
      padding: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .error {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="tag">// STAFF ACCESS</div>
      <h1>Hotel AMS-B<br>Management</h1>
    </div>
    <div class="card">
      <div class="field">
        <label>STAFF ID</label>
        <input type="number" id="staff_id" placeholder="e.g. 1">
      </div>
      <div class="field">
        <label>ROLE</label>
        <select id="role">
          <option value="">Select role</option>
          <option value="manager">Manager</option>
          <option value="receptionist">Receptionist</option>
          <option value="housekeeper">Housekeeper</option>
        </select>
      </div>
      <button class="btn" onclick="login()">ACCESS SYSTEM</button>
      <div class="error" id="error"></div>
    </div>
  </div>
  <script>
    const API = '/api';
    async function login() {
      const staff_id = document.getElementById('staff_id').value;
      const role = document.getElementById('role').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      if (!staff_id || !role) {
        err.textContent = 'Fill in all fields.';
        err.style.display = 'block';
        return;
      }
      try {
        const res = await fetch(`${API}/auth/staff/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staff_id: parseInt(staff_id), role })
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Login failed.';
          err.style.display = 'block';
          return;
        }
        localStorage.setItem('staff', JSON.stringify(data.staff));
        localStorage.setItem('staff_token', data.token);
        window.location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = 'Server error.';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
