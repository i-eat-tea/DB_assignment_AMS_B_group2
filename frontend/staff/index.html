<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel AMS-B — Staff Portal</title>
    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">  

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .login-header {
      margin-bottom: 28px;
    }
    .login-header .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--primary);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .login-header h1 {
      font-size: 26px;
      font-weight: 300;
      color: var(--light);
      line-height: 1.3;
    }
    .card {
      padding: 32px;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 10px 14px;
    }
    .field select option {
      background: var(--surface-2);
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border: none;
      cursor: pointer;
    }
    .error-box {
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="tag">// STAFF ACCESS</div>
      <h1>Hotel AMS-B<br>Management</h1>
    </div>
    <div class="card">
      <div class="field">
        <label>STAFF ID</label>
        <input type="number" id="staff_id" placeholder="e.g. 1">
      </div>
      <div class="field">
        <label>ROLE</label>
        <select id="role">
          <option value="">Select role</option>
          <option value="manager">Manager</option>
          <option value="receptionist">Receptionist</option>
          <option value="housekeeper">Housekeeper</option>
        </select>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password">
      </div>
      <button class="btn btn-primary" onclick="login()">ACCESS SYSTEM</button>
      <div class="error-box" id="error"></div>
    </div>
  </div>

  <script>
    const API = '/api';
    async function login() {
      const staff_id = document.getElementById('staff_id').value;
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      if (!staff_id || !role || !password) {
        err.textContent = 'Fill in all fields.';
        err.style.display = 'block';
        return;
      }
      try {
        const res = await fetch(`${API}/auth/staff/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staff_id: parseInt(staff_id), role, password })
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Login failed.';
          err.style.display = 'block';
          return;
        }
        localStorage.setItem('staff', JSON.stringify(data.staff));
        localStorage.setItem('staff_token', data.token);
        window.location.href = 'dashboard.html';
      } catch (e) {
        err.textContent = 'Server error.';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
