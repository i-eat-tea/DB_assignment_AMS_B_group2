<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel AMS-B — Staff Portal</title>
    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">  

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
  <style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F7F8F6;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .login-header { margin-bottom: 24px; }
  .login-header .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #1D9E75;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .login-header h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1A1D1A;
    line-height: 1.3;
  }

  .card {
    background: #FFFFFF;
    border: 1px solid #E2E6E0;
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #6B7068;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 6px;
  }
  .field input,
  .field select {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid #E2E6E0;
    border-radius: 8px;
    font-size: 13.5px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #1A1D1A;
    background: #FFFFFF;
    transition: border-color 0.15s;
    outline: none;
  }
  .field input:focus,
  .field select:focus { border-color: #1D9E75; }
  .field select option { background: #fff; }

  .btn-primary {
    width: 100%;
    padding: 11px;
    margin-top: 6px;
    border: none;
    border-radius: 8px;
    background: #1D9E75;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #0F6E56; }

  .error-box {
    background: #FDE8E8;
    border: 1px solid #F5C2C7;
    color: #9B2335;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 12px;
    display: none;
  }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="tag">// STAFF ACCESS</div>
      <h1>Hotel AMS-B<br>Management</h1>
    </div>
    <div class="card">
      <div class="field">
        <label>STAFF ID</label>
        <input type="number" id="staff_id" placeholder="e.g. 1">
      </div>
      <div class="field">
        <label>ROLE</label>
        <select id="role">
          <option value="">Select role</option>
          <option value="manager">Manager</option>
          <option value="cashier">Receptionist</option>
          <option value="house_keeping">Housekeeper</option>
        </select>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password">
      </div>
      <button class="btn btn-primary" onclick="login()">ACCESS SYSTEM</button>
      <div class="error-box" id="error"></div>
    </div>
  </div>

  <script>
    const API = '/api';
    async function login() {
      const staff_id = document.getElementById('staff_id').value;
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      
      if (!staff_id || !role || !password) {
        err.textContent = 'Fill in all fields.';
        err.style.display = 'block';
        return;
      }
      try {
        const res = await fetch(`${API}/auth/staff/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staff_id: parseInt(staff_id), role, password })
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Login failed.';
          err.style.display = 'block';
          return;
        }
        
        // Save authenticated metrics
        localStorage.setItem('staff', JSON.stringify(data.staff));
        localStorage.setItem('staff_token', data.token);
        
        // Dynamic split-routing engine
        if (data.staff.role === 'manager') {
          window.location.href = 'dashboard.html';
        } else if (data.staff.role === 'receptionist' || data.staff.role === 'cashier') {
          window.location.href = 'reception.html';
        } else if (data.staff.role === 'house_keeping') {
          window.location.href = 'housekeeping.html';
        } else {
          err.textContent = `Role system path not configured for: ${data.staff.role}`;
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Server error.';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
