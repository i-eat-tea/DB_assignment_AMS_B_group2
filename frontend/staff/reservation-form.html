<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Form | Hotel AMS-B</title>
  <link href="img/favicon.ico" rel="icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1D9E75;
      --primary-dark: #0F6E56;
      --primary-light: #E1F5EE;
      --bg: #F7F8F6;
      --surface: #FFFFFF;
      --surface-2: #F1F3F0;
      --text: #1A1D1A;
      --text-muted: #6B7068;
      --border: #E2E6E0;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .back-btn:hover { background: var(--surface-2); color: var(--text); }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .divider-v { width: 1px; height: 18px; background: var(--border); }

    /* Content */
    .content { max-width: 680px; margin: 32px auto; padding: 0 20px 60px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title i { color: var(--primary); }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Field */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field select:focus { border-color: var(--primary); }
    .field input[readonly] { background: var(--surface-2); cursor: not-allowed; }

    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
    }
    .btn:hover { background: var(--surface-2); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-danger { color: #9B2335; border-color: #F5C2C7; }
    .btn-danger:hover { background: #FFF0F2; }

    /* Toast */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      animation: slideUp 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .toast.success { background: #EDF7F0; color: #2B5E38; border: 1px solid #A3D9B1; }
    .toast.error { background: #FDE8E8; color: #9B2335; border: 1px solid #F5C2C7; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .mode-badge {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
      background: #FEF3CD; color: #7D5A00;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn" id="backLink">
        <i class="fas fa-arrow-left"></i> Back
      </a>
      <div class="divider-v"></div>
      <span class="topbar-title">Manage Reservation</span>
      <span class="mode-badge">EDIT</span>
    </div>
  </div>

  <div class="content">

    <!-- Guest Info (Read Only) -->
    <div class="card">
      <div class="card-title"><i class="fas fa-user"></i> Guest Information</div>
      <div class="grid-2">
        <div class="field">
          <label>Reservation ID</label>
          <input type="text" id="res_id" readonly>
        </div>
        <div class="field">
          <label>Customer Name</label>
          <input type="text" id="customer_name" readonly>
        </div>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Email Address</label>
        <input type="text" id="email" readonly>
      </div>
    </div>

    <!-- Stay Details -->
    <div class="card">
      <div class="card-title"><i class="fas fa-calendar-alt"></i> Stay Details</div>
      <div class="field">
        <label>Room</label>
        <select id="room_id">
          <option value="">Loading rooms...</option>
        </select>
      </div>
      <div class="grid-2" style="margin-top:14px">
        <div class="field">
          <label>Check-in Date</label>
          <input type="date" id="check_in_date">
        </div>
        <div class="field">
          <label>Check-out Date</label>
          <input type="date" id="check_out_date">
        </div>
      </div>
    </div>

    <!-- Status & Payment -->
    <div class="card">
      <div class="card-title"><i class="fas fa-info-circle"></i> Status & Payment</div>
      <div class="grid-2">
        <div class="field">
          <label>Reservation Status</label>
          <select id="status">
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="field">
          <label>Payment Status</label>
          <select id="is_paid">
            <option value="0">Unpaid</option>
            <option value="1">Paid</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:14px" id="billField">
        <label>Total Bill ($)</label>
        <input type="text" id="total_bill" readonly placeholder="Not generated yet">
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-danger" onclick="cancelReservation()">
        <i class="fas fa-times"></i> Cancel Reservation
      </button>
      <div style="flex:1"></div>
      <button class="btn" onclick="goBack()">Cancel</button>
      <button class="btn btn-primary" onclick="saveReservation()">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </div>

  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    const API = '/api/staff';
    let token = localStorage.getItem('staff_token');
    let resId = null;
    let staffData = JSON.parse(localStorage.getItem('staff') || '{}');

    if (!token || !staffData.staff_id) window.location.href = 'staff-login.html';

    // Adjust back link based on role
    if (staffData.role === 'receptionist' || staffData.role === 'cashier') {
      document.getElementById('backLink').href = 'reception.html';
    }

    const params = new URLSearchParams(window.location.search);
    resId = params.get('res_id') ? parseInt(params.get('res_id')) : null;

    if (!resId) {
      alert('No Reservation ID provided.');
      window.history.back();
    }

    // Initial load
    init();

    async function init() {
      await loadRooms();
      await loadReservation(resId);
    }

    function goBack() {
      if (staffData.role === 'manager') window.location.href = 'dashboard.html';
      else window.location.href = 'reception.html';
    }

    async function loadRooms() {
      try {
        const res = await fetch(`${API}/rooms`, { headers: { 'x-staff-token': token } });
        const rooms = await res.json();
        const select = document.getElementById('room_id');
        select.innerHTML = rooms.map(r => 
          `<option value="${r.room_id}">Room ${r.number} (${r.type}) - $${r.price}</option>`
        ).join('');
      } catch (e) {
        showToast('Failed to load rooms.', 'error');
      }
    }

    async function loadReservation(id) {
      try {
        const res = await fetch(`${API}/reservation/${id}`, {
          headers: { 'x-staff-token': token }
        });
        const r = await res.json();
        if (r.error) { showToast(r.error, 'error'); return; }

        document.getElementById('res_id').value = `#${r.reservation_id}`;
        document.getElementById('customer_name').value = r.customer_name || '';
        document.getElementById('email').value = r.email || '';
        document.getElementById('room_id').value = r.room_id;
        document.getElementById('check_in_date').value = formatDate(r.check_in_date);
        document.getElementById('check_out_date').value = formatDate(r.check_out_date);
        document.getElementById('status').value = r.status;
        document.getElementById('is_paid').value = r.is_paid ? "1" : "0";
        document.getElementById('total_bill').value = r.total_bill ? r.total_bill : "Not generated";
      } catch (e) {
        showToast('Failed to load reservation.', 'error');
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toISOString().split('T')[0];
    }

    async function saveReservation() {
      const room_id = document.getElementById('room_id').value;
      const check_in_date = document.getElementById('check_in_date').value;
      const check_out_date = document.getElementById('check_out_date').value;
      const status = document.getElementById('status').value;
      const is_paid = document.getElementById('is_paid').value === "1";

      try {
        // Update main reservation details
        const res1 = await fetch(`${API}/reservation/${resId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-staff-token': token },
          body: JSON.stringify({ room_id, check_in_date, check_out_date, status })
        });
        
        // Update payment status
        const res2 = await fetch(`${API}/reservation/${resId}/payment`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-staff-token': token },
          body: JSON.stringify({ is_paid })
        });

        const d1 = await res1.json();
        const d2 = await res2.json();

        if (d1.success && d2.success) {
          showToast('Reservation updated successfully!', 'success');
          setTimeout(() => goBack(), 1200);
        } else {
          showToast(d1.error || d2.error || 'Update failed.', 'error');
        }
      } catch (e) {
        showToast('Server error.', 'error');
      }
    }

    async function cancelReservation() {
      if (!confirm('Are you sure you want to cancel this reservation?')) return;
      try {
        const res = await fetch(`${API}/reservation/${resId}/cancel`, {
          method: 'PUT',
          headers: { 'x-staff-token': token }
        });
        const data = await res.json();
        if (data.success) {
          showToast('Reservation cancelled.');
          document.getElementById('status').value = 'cancelled';
          setTimeout(() => goBack(), 1200);
        } else {
          showToast(data.error || 'Failed to cancel.', 'error');
        }
      } catch (e) {
        showToast('Server error.', 'error');
      }
    }

    function showToast(msg, type = 'success') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  </script>
</body>
</html>
